# PV-EV Surplus Charging Automation Package
# Created: 2025-10-05
# Description: Automatic EV charging with PV surplus energy management

homeassistant:
  customize:
    # Configuration Helpers
    input_boolean.pv_ev_surplus_automation:
      friendly_name: "PV-EV Surplus Automation"
      icon: mdi:solar-power-variant
    input_boolean.tesla_charge_current_api:
      friendly_name: "Tesla Current API"
      icon: mdi:api
    input_boolean.tesla_charge_on_off_api:
      friendly_name: "Tesla Charge ON/OFF API"
      icon: mdi:api
    input_boolean.ev_charger_only_mode:
      friendly_name: "EV Charger Only Mode"
      icon: mdi:ev-plug-type2
    input_boolean.disable_monophasic:
      friendly_name: "Disable Monophasic"
      icon: mdi:numeric-3-box-multiple
    input_boolean.min_house_battery_soc_block:
      friendly_name: "Min Battery SOC Block"
      icon: mdi:battery-alert
    input_boolean.grid_import_block:
      friendly_name: "Grid Import Block"
      icon: mdi:transmission-tower-import

    # Configuration Numbers
    input_number.ev_update_interval:
      friendly_name: "EV Update Interval"
      icon: mdi:timer
    input_number.ev_share_percentage_default:
      friendly_name: "EV Share Percentage Default"
      icon: mdi:percent
    input_number.ev_share_percentage_max:
      friendly_name: "EV Share Percentage Max"
      icon: mdi:percent
    input_number.margin_percentage:
      friendly_name: "Margin Percentage"
      icon: mdi:percent
    input_number.ev_reserved_margin_allowance:
      friendly_name: "EV Reserved Margin Allowance"
      icon: mdi:counter
    input_number.phase_mode_update_delay:
      friendly_name: "Phase Mode Update Delay"
      icon: mdi:timer
    input_number.tesla_min_charging_a:
      friendly_name: "Tesla Min Charging Current"
      icon: mdi:current-ac
    input_number.ev_charger_min_charging_a:
      friendly_name: "EV Charger Min Charging Current"
      icon: mdi:current-ac
    input_number.max_monophasic_a:
      friendly_name: "Max Monophasic Current"
      icon: mdi:current-ac
    input_number.min_triphasic_a:
      friendly_name: "Min Triphasic Current"
      icon: mdi:current-ac
    input_number.min_house_battery_soc:
      friendly_name: "Min House Battery SOC"
      icon: mdi:battery-low
    input_number.battery_soc_max_share_threshold:
      friendly_name: "Battery SOC Max Share Threshold"
      icon: mdi:battery-charging-100
    input_number.dashboard_values_update_interval:
      friendly_name: "Dashboard Update Interval"
      icon: mdi:timer

# Configuration Helpers
input_boolean:
  # Main automation switch
  pv_ev_surplus_automation:
    name: "PV-EV Surplus Automation"
    initial: true
    icon: mdi:solar-power-variant

  # API control switches
  tesla_charge_current_api:
    name: "Tesla Current API"
    initial: true
    icon: mdi:api

  tesla_charge_on_off_api:
    name: "Tesla Charge ON/OFF API"
    initial: true
    icon: mdi:api

  # EV Charger Only mode - when on, the automation never uses the Tesla API
  # (drives the wallbox directly), so a non-Tesla car can be charged.
  ev_charger_only_mode:
    name: "EV Charger Only Mode"
    initial: false
    icon: mdi:ev-plug-type2

  # Disable Monophasic - when on, only Triphasic charging is used (never single
  # phase). Charging pauses below min_charging x3 total (per-phase < minimum).
  # Default ON (triphasic-only is the normal mode).
  disable_monophasic:
    name: "Disable Monophasic"
    initial: true
    icon: mdi:numeric-3-box-multiple

  # Safety blocks
  min_house_battery_soc_block:
    name: "Min Battery SOC Block"
    initial: true
    icon: mdi:battery-alert

  grid_import_block:
    name: "Grid Import Block"
    initial: true
    icon: mdi:transmission-tower-import

input_number:
  # Timing intervals
  # Must be a whole-minute multiple: the trigger fires every minute and the
  # modulo throttle only lines up correctly on 60 s boundaries.
  ev_update_interval:
    name: "EV Update Interval"
    min: 60
    max: 600
    step: 60
    initial: 60
    unit_of_measurement: "s"
    icon: mdi:timer

  dashboard_values_update_interval:
    name: "Dashboard Update Interval"
    min: 5
    max: 60
    step: 1
    initial: 10
    unit_of_measurement: "s"
    icon: mdi:timer

  # Power sharing percentages
  ev_share_percentage_default:
    name: "EV Share Percentage Default"
    min: 0
    max: 95
    step: 5
    initial: 50
    unit_of_measurement: "%"
    icon: mdi:percent

  ev_share_percentage_max:
    name: "EV Share Percentage Max"
    min: 0
    max: 95
    step: 5
    initial: 90
    unit_of_measurement: "%"
    icon: mdi:percent

  # Margin and allowance
  margin_percentage:
    name: "Margin Percentage"
    min: 0
    max: 95
    step: 5
    initial: 75
    unit_of_measurement: "%"
    icon: mdi:percent

  ev_reserved_margin_allowance:
    name: "EV Reserved Margin Allowance"
    min: 1
    max: 20
    step: 1
    initial: 5
    unit_of_measurement: "cycles"
    icon: mdi:counter

  # Phase and timing delays
  phase_mode_update_delay:
    name: "Phase Mode Update Delay"
    min: 1
    max: 30
    step: 1
    initial: 5
    unit_of_measurement: "s"
    icon: mdi:timer

  # Current limits
  tesla_min_charging_a:
    name: "Tesla Min Charging Current"
    min: 1
    max: 16
    step: 1
    initial: 1
    unit_of_measurement: "A"
    icon: mdi:current-ac

  ev_charger_min_charging_a:
    name: "EV Charger Min Charging Current"
    min: 6
    max: 16
    step: 1
    initial: 6
    unit_of_measurement: "A"
    icon: mdi:current-ac

  max_monophasic_a:
    name: "Max Monophasic Current"
    min: 8
    max: 16
    step: 1
    initial: 8
    unit_of_measurement: "A"
    icon: mdi:current-ac

  min_triphasic_a:
    name: "Min Triphasic Current"
    min: 3
    max: 15
    step: 3
    initial: 9
    unit_of_measurement: "A"
    icon: mdi:current-ac

  # Battery SOC limit
  min_house_battery_soc:
    name: "Min House Battery SOC"
    min: 0
    max: 100
    step: 5
    initial: 20
    unit_of_measurement: "%"
    icon: mdi:battery-low

  battery_soc_max_share_threshold:
    name: "Battery SOC Max Share Threshold"
    min: 50
    max: 100
    step: 5
    initial: 90
    unit_of_measurement: "%"
    icon: mdi:battery-charging-100

# Dynamic Share Percentage Selector
input_select:
  ev_share_percentage:
    name: "EV Share Percentage"
    options:
      - "Default"
      - "Max"
    initial: "Default"
    icon: mdi:percent

  # Tesla Model Selector
  tesla_model:
    name: "Tesla Model"
    options:
      - "Model Y"
      - "Model 3"
    initial: "Model Y"
    icon: mdi:car-electric

# Counter for margin allowance tracking
counter:
  ev_margin_allowance_counter:
    name: "EV Margin Allowance Counter"
    initial: 0
    step: 1
    icon: mdi:counter

# Template Sensors for Calculations
template:
  - binary_sensor:
      # Effective Tesla-API state: each per-function API toggle, forced OFF
      # whenever EV Charger Only mode is on (so nothing touches Tesla entities).
      - name: "PV-EV Tesla Current API Active"
        default_entity_id: binary_sensor.pv_ev_tesla_current_api_active
        icon: mdi:api
        state: >
          {{ is_state('input_boolean.tesla_charge_current_api', 'on')
             and not is_state('input_boolean.ev_charger_only_mode', 'on') }}

      - name: "PV-EV Tesla On Off API Active"
        default_entity_id: binary_sensor.pv_ev_tesla_on_off_api_active
        icon: mdi:api
        state: >
          {{ is_state('input_boolean.tesla_charge_on_off_api', 'on')
             and not is_state('input_boolean.ev_charger_only_mode', 'on') }}

      # Whether the SELECTED Tesla model matches the physically connected car.
      # Forced true in EV Charger Only mode (no Tesla expected to be plugged in),
      # so the model sync and safety automations stay inert in that mode.
      - name: "PV-EV Tesla Model Confirmed"
        default_entity_id: binary_sensor.pv_ev_tesla_model_confirmed
        icon: mdi:car-check
        state: >
          {% if is_state('input_boolean.ev_charger_only_mode', 'on') %}
            true
          {% else %}
            {% set d = states('sensor.pv_ev_detected_tesla_model') %}
            {{ d in ['Model Y', 'Model 3'] and is_state('input_select.tesla_model', d) }}
          {% endif %}

  - sensor:
      # Active Tesla entity resolvers (selected via input_select.tesla_model).
      # Single source of truth so the Model Y / Model 3 picker isn't duplicated
      # across every script and automation that controls the car.
      - name: "Active Tesla Charge Switch"
        default_entity_id: sensor.pv_ev_active_tesla_charge_switch
        icon: mdi:ev-station
        state: >
          {% if is_state('input_select.tesla_model', 'Model Y') %}
            switch.tesla_model_y_charge
          {% else %}
            switch.tesla_model_3_charge
          {% endif %}

      - name: "Active Tesla Charge Current Number"
        default_entity_id: sensor.pv_ev_active_tesla_charge_current_number
        icon: mdi:current-ac
        state: >
          {% if is_state('input_select.tesla_model', 'Model Y') %}
            number.tesla_model_y_charge_current
          {% else %}
            number.tesla_model_3_charge_current
          {% endif %}

      - name: "Active Tesla Charging Sensor"
        default_entity_id: sensor.pv_ev_active_tesla_charging_sensor
        icon: mdi:battery-charging
        state: >
          {% if is_state('input_select.tesla_model', 'Model Y') %}
            sensor.tesla_model_y_charging
          {% else %}
            sensor.tesla_model_3_charging
          {% endif %}

      # Which Tesla is physically on the home wallbox: charge cable connected
      # AND the car is at home. A car Supercharging elsewhere has its cable on
      # but is not home, so it is correctly excluded. Definite when exactly one
      # car is cabled+home; otherwise Unknown. (Both cabled+home never happens
      # per the setup, so a home charge always resolves to a definite model.)
      - name: "PV-EV Detected Tesla Model"
        default_entity_id: sensor.pv_ev_detected_tesla_model
        icon: mdi:car-electric
        state: >
          {% set y = is_state('binary_sensor.tesla_model_y_charge_cable', 'on')
                     and is_state('device_tracker.tesla_model_y_location', 'home') %}
          {% set m3 = is_state('binary_sensor.tesla_model_3_charge_cable', 'on')
                      and is_state('device_tracker.tesla_model_3_location', 'home') %}
          {% if y and not m3 %}
            Model Y
          {% elif m3 and not y %}
            Model 3
          {% else %}
            Unknown
          {% endif %}

      # Real House Load (excluding EV charger)
      - name: "Real House Load"
        default_entity_id: sensor.pv_ev_real_house_load
        unit_of_measurement: "W"
        icon: mdi:home-lightning-bolt
        availability: >
          {{ states('sensor.gw_load') not in ['unavailable', 'unknown'] and
             states('sensor.ev_charger_power') not in ['unavailable', 'unknown'] }}
        state: >
          {% set house_load = states('sensor.gw_load') | float(0) %}
          {% set ev_charger_load = states('sensor.ev_charger_power') | float(0) * 1000 %}
          {{ (house_load - ev_charger_load) | round(0) | int }}

      # PV Surplus calculation (PV - Real House Load only)
      - name: "PV Surplus"
        default_entity_id: sensor.pv_ev_surplus
        unit_of_measurement: "W"
        icon: mdi:solar-power-variant
        availability: >
          {{ states('sensor.gw_pv') not in ['unavailable', 'unknown'] and
             states('sensor.pv_ev_real_house_load') not in ['unavailable', 'unknown'] }}
        state: >
          {% set pv_power = states('sensor.gw_pv') | float(0) %}
          {% set real_house_load = states('sensor.pv_ev_real_house_load') | float(0) %}
          {% set surplus = pv_power - real_house_load %}
          {{ (surplus if surplus >= 0 else 0) | round(0) | int }}

      # Current EV Share Percentage
      - name: "Current EV Share Percentage"
        default_entity_id: sensor.pv_ev_current_share_percentage
        unit_of_measurement: "%"
        icon: mdi:percent
        state: >
          {% if states('input_select.ev_share_percentage') == 'Max' %}
            {{ states('input_number.ev_share_percentage_max') }}
          {% else %}
            {{ states('input_number.ev_share_percentage_default') }}
          {% endif %}

      # Available Power for EV
      - name: "Available Power for EV"
        default_entity_id: sensor.pv_ev_available_power
        unit_of_measurement: "W"
        icon: mdi:car-electric
        state: >
          {% set surplus = states('sensor.pv_ev_surplus') | float(0) %}
          {% set share_percentage = states('sensor.pv_ev_current_share_percentage') | float(0) %}
          {{ (surplus * share_percentage / 100) | round(0) }}

      # Available Current for EV
      - name: "Available Current for EV"
        default_entity_id: sensor.pv_ev_available_current
        unit_of_measurement: "A"
        icon: mdi:current-ac
        state: >
          {% set available_power = states('sensor.pv_ev_available_power') | float(0) %}
          {{ (available_power / 230) | round(1) }}

      # Reserved Power
      - name: "Reserved Power"
        default_entity_id: sensor.pv_ev_reserved_power
        unit_of_measurement: "W"
        icon: mdi:battery-charging
        state: >
          {% set surplus = states('sensor.pv_ev_surplus') | float(0) %}
          {% set available_power = states('sensor.pv_ev_available_power') | float(0) %}
          {% set reserved = surplus - available_power %}
          {{ (reserved if reserved >= 0 else 0) | round(0) }}

      # Margin Power
      - name: "Margin Power"
        default_entity_id: sensor.pv_ev_margin_power
        unit_of_measurement: "W"
        icon: mdi:margin
        state: >
          {% set reserved_power = states('sensor.pv_ev_reserved_power') | float(0) %}
          {% set margin_percentage = states('input_number.margin_percentage') | float(0) %}
          {{ (reserved_power * margin_percentage / 100) | round(0) }}

      # Minimum Charging Current (based on API mode)
      - name: "Min Charging Current"
        default_entity_id: sensor.pv_ev_min_charging_current
        unit_of_measurement: "A"
        icon: mdi:current-ac
        state: >
          {% if is_state('binary_sensor.pv_ev_tesla_current_api_active', 'on') %}
            {{ states('input_number.tesla_min_charging_a') }}
          {% else %}
            {{ states('input_number.ev_charger_min_charging_a') }}
          {% endif %}

      # Target Phase Mode calculation (hysteresis to avoid mono/tri oscillation)
      #   - disable_monophasic ON  : Triphasic only (None below min_charging x3)
      #   - above max_monophasic_a : force Triphasic (too much for a single phase)
      #   - below min_triphasic_a  : force Monophasic (per-phase current too low)
      #   - in between             : keep the current phase (sticky -> no flip-flop)
      # Configure max_monophasic_a >= min_triphasic_a so the overlap band acts as
      # the hysteresis zone (rising edge switches at max_monophasic_a, falling edge
      # at min_triphasic_a). A gap instead degenerates to a single threshold.
      - name: "Target Phase Mode"
        default_entity_id: sensor.pv_ev_target_phase
        icon: mdi:electric-switch
        state: >
          {% set available_current = states('sensor.pv_ev_available_current') | float(0) %}
          {% set max_mono = states('input_number.max_monophasic_a') | float(14) %}
          {% set min_tri = states('input_number.min_triphasic_a') | float(12) %}
          {% set min_charging = states('sensor.pv_ev_min_charging_current') | float(5) %}
          {% set current_phase = states('sensor.pv_ev_current_phase') %}
          {% set force_tri = is_state('input_boolean.disable_monophasic', 'on') %}

          {% if force_tri %}
            {# Triphasic only: need per-phase (available_current / 3) >= min_charging #}
            {{ 'Triphasic' if available_current >= (min_charging * 3) else 'None' }}
          {% elif available_current < min_charging %}
            None
          {% elif available_current > max_mono %}
            Triphasic
          {% elif available_current < min_tri %}
            Monophasic
          {% else %}
            {{ current_phase if current_phase in ['Monophasic', 'Triphasic'] else 'Monophasic' }}
          {% endif %}

      # Target Current calculation
      - name: "Target Current"
        default_entity_id: sensor.pv_ev_target_current
        unit_of_measurement: "A"
        icon: mdi:current-ac
        state: >
          {% set available_current = states('sensor.pv_ev_available_current') | float(0) %}
          {% set target_phase = states('sensor.pv_ev_target_phase') %}
          {% set min_charging = states('sensor.pv_ev_min_charging_current') | float(5) %}
          {% set max_mono = states('input_number.max_monophasic_a') | float(14) %}

          {% if target_phase == 'None' or available_current < min_charging %}
            0
          {% elif target_phase == 'Triphasic' %}
            {# per-phase current floored (surplus-only) and capped at 16A; below the per-phase minimum -> 0 #}
            {% set triphasic_current = [(available_current / 3) | round(0, 'floor') | int, 16] | min %}
            {{ triphasic_current if triphasic_current >= min_charging | int else 0 }}
          {% elif target_phase == 'Monophasic' %}
            {# floored: never draw more than the available surplus #}
            {% set mono_current = available_current | round(0, 'floor') | int %}
            {% if mono_current >= min_charging | int and mono_current <= 16 %}
              {{ mono_current }}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}

      # Current Phase Mode
      - name: "Current Phase Mode"
        default_entity_id: sensor.pv_ev_current_phase
        icon: mdi:electric-switch
        state: >
          {{ states('select.ev_charger_mode') }}

      # Current Charging Current (based on API mode)
      - name: "Current Charging Current"
        default_entity_id: sensor.pv_ev_current_charging_current
        unit_of_measurement: "A"
        icon: mdi:current-ac
        state: >
          {% if is_state('binary_sensor.pv_ev_tesla_current_api_active', 'on') %}
            {{ states(states('sensor.pv_ev_active_tesla_charge_current_number')) | float(0) }}
          {% else %}
            {{ states('number.ev_charger_set_charge_current') | float(0) }}
          {% endif %}

      # EV Connection Status
      - name: "EV Connection Status"
        default_entity_id: sensor.pv_ev_connection_status
        icon: mdi:car-electric
        state: >
          {% set status = states('sensor.ev_charger_status') %}
          {% if status in ['plugged_in', 'charged', 'charging'] %}
            Connected
          {% else %}
            Disconnected
          {% endif %}

      # Current charging state (boolean) - uses actual device status
      - name: "Current Charging State"
        default_entity_id: sensor.pv_ev_current_charging_state
        icon: mdi:car-electric
        state: >
          {{ is_state('sensor.ev_charger_status', 'charging') }}

      # EV Charge Complete (selected Tesla model reports "complete")
      - name: "EV Charge Complete"
        default_entity_id: sensor.pv_ev_charge_complete
        icon: mdi:battery-check
        state: >
          {% if is_state('input_boolean.ev_charger_only_mode', 'on') %}
            {{ is_state('sensor.ev_charger_status', 'charged') }}
          {% else %}
            {{ is_state(states('sensor.pv_ev_active_tesla_charging_sensor'), 'complete') }}
          {% endif %}

      # Safety Check Status
      - name: "Safety Check Status"
        default_entity_id: sensor.pv_ev_safety_check
        icon: mdi:shield-check
        state: >
          {% set battery_soc = states('sensor.gw_battery') | float(0) %}
          {% set min_soc = states('input_number.min_house_battery_soc') | float(0) %}
          {% set grid_power = states('sensor.gw_from_grid') | float(0) %}
          {% set soc_block = is_state('input_boolean.min_house_battery_soc_block', 'on') %}
          {% set grid_block = is_state('input_boolean.grid_import_block', 'on') %}

          {% set soc_ok = not soc_block or battery_soc >= min_soc %}
          {% set grid_ok = not grid_block or grid_power <= 0 %}

          {% if soc_ok and grid_ok %}
            OK
          {% elif not soc_ok %}
            Battery SOC Low
          {% elif not grid_ok %}
            Grid Import Detected
          {% else %}
            Multiple Issues
          {% endif %}

      # Automation Status
      - name: "Automation Status"
        default_entity_id: sensor.pv_ev_automation_status
        icon: >
          {% if is_state('input_boolean.pv_ev_surplus_automation', 'on') %}
            mdi:play-circle
          {% else %}
            mdi:stop-circle
          {% endif %}
        state: >
          {% if is_state('input_boolean.pv_ev_surplus_automation', 'on') %}
            Active
          {% else %}
            Inactive
          {% endif %}

      # Test why EV charge isn't turning on
      - name: "Debug: Why Not Charging"
        default_entity_id: sensor.pv_ev_debug_why_not_charging
        icon: mdi:bug
        state: >
          {% set automation_on = is_state('input_boolean.pv_ev_surplus_automation', 'on') %}
          {% set target_current = states('sensor.pv_ev_target_current') | int(0) %}
          {% set min_current = states('sensor.pv_ev_min_charging_current') | int(5) %}
          {% set charging_on = states('sensor.pv_ev_current_charging_state') == 'True' %}
          {% set ev_status = states('sensor.ev_charger_status') %}
          {% set battery_soc = states('sensor.gw_battery') | float(0) %}
          {% set min_soc = states('input_number.min_house_battery_soc') | float(20) %}
          {% set soc_block = is_state('input_boolean.min_house_battery_soc_block', 'on') %}
          {% set grid_power = states('sensor.gw_from_grid') | float(0) %}
          {% set grid_block = is_state('input_boolean.grid_import_block', 'on') %}
          {% set ev_charge_complete = states('sensor.pv_ev_charge_complete') == 'True' %}

          {% if not automation_on %}
            Automation OFF
          {% elif ev_charge_complete %}
            EV fully charged
          {% elif ev_status not in ['plugged_in', 'charged', 'charging'] %}
            EV not connected ({{ ev_status }})
          {% elif target_current < min_current %}
            Insufficient current ({{ target_current }}A < {{ min_current }}A)
          {% elif soc_block and battery_soc < min_soc %}
            Battery SOC too low ({{ battery_soc }}% < {{ min_soc }}%)
          {% elif grid_block and grid_power > 0 %}
            Grid import detected ({{ grid_power }}W > 0)
          {% elif charging_on %}
            Already charging
          {% elif target_current >= min_current and not charging_on %}
            Should be charging! Check automation logs
          {% else %}
            Unknown issue
          {% endif %}

      # Test if Case 2 condition is met
      - name: "Debug: Case 2 Condition Met"
        default_entity_id: sensor.pv_ev_debug_case2_condition
        icon: mdi:check-circle
        state: >
          {% set target_current = states('sensor.pv_ev_target_current') | int(0) %}
          {% set min_current = states('sensor.pv_ev_min_charging_current') | int(5) %}
          {% set ev_charge_on = states('sensor.pv_ev_current_charging_state') == 'True' %}
          {{ target_current >= min_current and not ev_charge_on }}

      # System Health Check
      - name: "System Health"
        default_entity_id: sensor.pv_ev_system_health
        icon: >
          {% set health = states('sensor.pv_ev_system_health') %}
          {% if health == 'Healthy' %}
            mdi:check-circle
          {% elif health == 'Warning' %}
            mdi:alert-circle
          {% else %}
            mdi:close-circle
          {% endif %}
        state: >
          {% set sensors = [
            'sensor.gw_battery',
            'sensor.gw_pv', 
            'sensor.gw_load',
            'sensor.gw_from_grid',
            'sensor.ev_charger_power',
            'sensor.ev_charger_status'
          ] %}
          {% set unavailable = [] %}
          {% set warning = [] %}

          {% for sensor in sensors %}
            {% set state = states(sensor) %}
            {% if state in ['unavailable', 'unknown'] %}
              {% set unavailable = unavailable + [sensor] %}
            {% elif state == '' %}
              {% set warning = warning + [sensor] %}
            {% endif %}
          {% endfor %}

          {% if unavailable | length > 0 %}
            Critical
          {% elif warning | length > 0 %}
            Warning
          {% else %}
            Healthy
          {% endif %}

      # Performance Metrics
      - name: "EV Charging Efficiency"
        default_entity_id: sensor.pv_ev_efficiency_ratio
        unit_of_measurement: "%"
        icon: mdi:speedometer
        state: >
          {% set available_power = states('sensor.pv_ev_available_power') | float(0) %}
          {% set actual_power = states('sensor.ev_charger_power') | float(0) * 1000 %}
          {% if available_power > 0 %}
            {{ ((actual_power / available_power) * 100) | round(1) }}
          {% else %}
            0
          {% endif %}

      # Total Energy Tracking - mirrors the charger's own daily energy counter.
      # Reports unavailable (rather than a fabricated value) when the source is missing.
      - name: "Daily EV Energy from PV"
        default_entity_id: sensor.pv_ev_daily_energy
        unit_of_measurement: "kWh"
        device_class: energy
        icon: mdi:lightning-bolt
        availability: >
          {{ states('sensor.ev_charger_energy_daily') not in ['unavailable', 'unknown'] }}
        state: >
          {{ states('sensor.ev_charger_energy_daily') | float(0) }}

# Automations
automation:
  # Main PV-EV Surplus Update Logic
  - id: pv_ev_surplus_update_logic
    alias: "PV-EV Surplus Update Logic"
    description: "Handles the main charging logic when triggered by interval or automation turn on"
    trigger:
      # Time trigger every minute (ev_update_interval controls actual execution)
      - platform: time_pattern
        minutes: "/1"
        id: "interval_trigger"
      # Immediate trigger when automation is turned on
      - platform: state
        entity_id: input_boolean.pv_ev_surplus_automation
        to: "on"
        id: "automation_turned_on"
    condition:
      - condition: state
        entity_id: input_boolean.pv_ev_surplus_automation
        state: "on"
      # Daytime only - skip between sunset and sunrise (no PV surplus at night)
      - condition: state
        entity_id: sun.sun
        state: "above_horizon"
      # Only run when a vehicle is actually connected (skips 'available' = unplugged)
      - condition: state
        entity_id: sensor.pv_ev_connection_status
        state: "Connected"
    action:
      # For interval triggers, check if it's time to update based on the configured interval
      - if:
          - condition: and
            conditions:
              - condition: trigger
                id: "interval_trigger"
              - condition: template
                value_template: >
                  {% set interval = states('input_number.ev_update_interval') | int(60) %}
                  {% set now_seconds = now().timestamp() | int %}
                  {{ now_seconds % interval < 60 }}
        then: []
        else:
          - if:
              - condition: trigger
                id: "interval_trigger"
            then:
              - stop: "Not time for scheduled update yet"

      # UNIFIED LOGIC: This runs for both interval triggers and automation turn-on
      - variables:
          target_current: "{{ states('sensor.pv_ev_target_current') | int }}"
          target_phase: "{{ states('sensor.pv_ev_target_phase') }}"
          current_current: "{{ states('sensor.pv_ev_current_charging_current') | int }}"
          current_phase: "{{ states('sensor.pv_ev_current_phase') }}"
          min_charging_current: "{{ states('sensor.pv_ev_min_charging_current') | int }}"
          charging_state: "{{ is_state('sensor.ev_charger_status', 'charging') }}"
          ev_status: "{{ states('sensor.ev_charger_status') }}"
          battery_soc: "{{ states('sensor.gw_battery') | float(0) }}"
          min_soc: "{{ states('input_number.min_house_battery_soc') | float(0) }}"
          grid_power: "{{ states('sensor.gw_from_grid') | float(0) }}"
          available_power_for_ev: "{{ states('sensor.pv_ev_available_power') | float(0) }}"
          soc_block: "{{ is_state('input_boolean.min_house_battery_soc_block', 'on') }}"
          grid_block: "{{ is_state('input_boolean.grid_import_block', 'on') }}"
          ev_charge_complete: "{{ states('sensor.pv_ev_charge_complete') == 'True' }}"
          phase_needs_update: "{{ target_phase != current_phase and target_phase in ['Monophasic', 'Triphasic'] }}"
          current_needs_update: "{{ target_current != current_current }}"
          needs_to_start_charging: "{{ not charging_state and target_current >= min_charging_current and not ev_charge_complete }}"

      # Step 1: Safety checks - stop charging if any safety condition fails (only if currently charging)
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ charging_state }}"
              - condition: or
                conditions:
                  # EV not connected
                  - condition: template
                    value_template: "{{ ev_status not in ['plugged_in', 'charged', 'charging'] }}"
                  # EV fully charged
                  - condition: template
                    value_template: "{{ ev_charge_complete }}"
                  # Battery SOC too low
                  - condition: template
                    value_template: "{{ soc_block and battery_soc < min_soc }}"
                  # Grid import detected AND insufficient available power
                  - condition: template
                    value_template: "{{ grid_block and grid_power > 0 and available_power_for_ev <= 0 }}"
            sequence:
              - service: script.control_charging
                data:
                  action: "off"
              - service: counter.reset
                target:
                  entity_id: counter.ev_margin_allowance_counter
              - service: persistent_notification.create
                data:
                  title: "PV-EV: Charging Stopped"
                  message: >
                    Safety check failed:
                    EV Status: {{ ev_status }}
                    Battery SOC: {{ battery_soc }}% (min: {{ min_soc }}%)
                    Grid Power: {{ grid_power }}W
                    Available Power for EV: {{ available_power_for_ev }}W
                    EV Charge Complete: {{ ev_charge_complete }}
                  notification_id: pv_ev_safety_stop
              - stop: "Safety conditions not met"
          # If safety check fails but not charging, just stop automation (no API call needed)
          - conditions:
              - condition: template
                value_template: "{{ not charging_state }}"
              - condition: or
                conditions:
                  # EV not connected
                  - condition: template
                    value_template: "{{ ev_status not in ['plugged_in', 'charged', 'charging'] }}"
                  # EV fully charged
                  - condition: template
                    value_template: "{{ ev_charge_complete }}"
                  # Battery SOC too low
                  - condition: template
                    value_template: "{{ soc_block and battery_soc < min_soc }}"
                  # Grid import detected AND insufficient available power
                  - condition: template
                    value_template: "{{ grid_block and grid_power > 0 and available_power_for_ev <= 0 }}"
            sequence:
              - service: counter.reset
                target:
                  entity_id: counter.ev_margin_allowance_counter
              - service: persistent_notification.create
                data:
                  title: "PV-EV: Safety Check Failed"
                  message: >
                    Safety check failed (not charging, no API call):
                    EV Status: {{ ev_status }}
                    Battery SOC: {{ battery_soc }}% (min: {{ min_soc }}%)
                    Grid Power: {{ grid_power }}W
                    Available Power for EV: {{ available_power_for_ev }}W
                  notification_id: pv_ev_safety_check
              - stop: "Safety conditions not met"

      # Step 2: Check if target current is sufficient (only stop if currently charging)
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target_current < min_charging_current }}"
              - condition: template
                value_template: "{{ charging_state }}"
            sequence:
              - service: script.control_charging
                data:
                  action: "off"
              - service: counter.reset
                target:
                  entity_id: counter.ev_margin_allowance_counter
              - service: persistent_notification.create
                data:
                  title: "PV-EV: Insufficient Current"
                  message: >
                    Target current {{ target_current }}A is below minimum {{ min_charging_current }}A
                  notification_id: pv_ev_insufficient_current
              - stop: "Insufficient current for charging"

      # Step 3: Early exit if no updates needed (avoid unnecessary API calls)
      - if:
          - condition: template
            value_template: "{{ not phase_needs_update and not current_needs_update and not needs_to_start_charging }}"
        then:
          # Steady state reached (current matches target): clear any leftover
          # margin grace so the next dip starts with a full allowance.
          - if:
              - condition: numeric_state
                entity_id: counter.ev_margin_allowance_counter
                above: 0
            then:
              - service: counter.reset
                target:
                  entity_id: counter.ev_margin_allowance_counter
          - stop: "No updates needed - avoiding unnecessary API calls"

      # Step 4: Handle PHASE changes (only if needed)
      - if:
          - condition: template
            value_template: "{{ phase_needs_update }}"
        then:
          - service: persistent_notification.create
            data:
              title: "PV-EV: Phase Change Needed"
              message: >
                Phase: {{ current_phase }} → {{ target_phase }}
                {{ 'Stopping charging for phase update...' if charging_state else 'Updating phase...' }}
              notification_id: pv_ev_phase_change
          # Only stop charging if currently charging
          - if:
              - condition: template
                value_template: "{{ charging_state }}"
            then:
              - service: script.control_charging
                data:
                  action: "off"
              - delay:
                  seconds: "{{ states('input_number.phase_mode_update_delay') | int }}"
          - service: select.select_option
            target:
              entity_id: select.ev_charger_mode
            data:
              option: "{{ target_phase }}"
          - delay:
              seconds: "{{ states('input_number.phase_mode_update_delay') | int }}"
          - service: persistent_notification.create
            data:
              title: "✅ Phase Updated"
              message: >
                Phase successfully updated to: {{ target_phase }}
              notification_id: pv_ev_phase_updated
          # After phase change, recalculate if we need to start charging
          - variables:
              charging_state: "{{ is_state('sensor.ev_charger_status', 'charging') }}"
              needs_to_start_charging: "{{ not charging_state and target_current >= min_charging_current and not ev_charge_complete }}"

      # Step 5: Handle CURRENT changes (only if needed, with margin allowance logic)
      - if:
          - condition: template
            value_template: "{{ current_needs_update and target_current > 0 }}"
        then:
          # Check if this is a DECREASE (margin allowance may apply)
          - if:
              - condition: template
                value_template: "{{ target_current < current_current }}"
            then:
              # Decreasing - check margin allowance
              - variables:
                  available_power: "{{ states('sensor.pv_ev_available_power') | float(0) }}"
                  current_power: "{{ current_current * 230 * (3 if target_phase == 'Triphasic' else 1) }}"
                  margin_power: "{{ states('sensor.pv_ev_margin_power') | float(0) }}"
                  power_deficit: "{{ current_power - available_power }}"
                  counter_value: "{{ states('counter.ev_margin_allowance_counter') | int(0) }}"
                  max_allowance: "{{ states('input_number.ev_reserved_margin_allowance') | int(5) }}"
              - if:
                  - condition: template
                    value_template: "{{ power_deficit > 0 and power_deficit <= margin_power and counter_value < max_allowance }}"
                then:
                  # Within margin - use grace period (NO current update, sets current_needs_update to false)
                  - service: counter.increment
                    target:
                      entity_id: counter.ev_margin_allowance_counter
                  - service: persistent_notification.create
                    data:
                      title: "PV-EV: Margin Grace Period"
                      message: >
                        Deficit: {{ power_deficit | round(0) }}W ≤ Margin: {{ margin_power | round(0) }}W
                        Grace cycles: {{ counter_value + 1 }}/{{ max_allowance }}
                        Keeping current at {{ current_current }}A (no API call)
                      notification_id: pv_ev_margin_grace
                  - variables:
                      current_needs_update: false
                else:
                  # Must decrease - update current
                  - service: persistent_notification.create
                    data:
                      title: "PV-EV: Decreasing Current"
                      message: >
                        {{ current_current }}A → {{ target_current }}A (API call)
                      notification_id: pv_ev_decrease
                  - service: script.update_charging_current
                    data:
                      current: "{{ target_current }}"
                  - service: counter.reset
                    target:
                      entity_id: counter.ev_margin_allowance_counter
            else:
              # Increasing - always update immediately
              - service: persistent_notification.create
                data:
                  title: "PV-EV: Increasing Current"
                  message: >
                    {{ current_current }}A → {{ target_current }}A (API call)
                  notification_id: pv_ev_increase
              - service: script.update_charging_current
                data:
                  current: "{{ target_current }}"
              - service: counter.reset
                target:
                  entity_id: counter.ev_margin_allowance_counter
        else:
          # Current matches target - check if we should reset margin counter
          - variables:
              available_power: "{{ states('sensor.pv_ev_available_power') | float(0) }}"
              current_power: "{{ current_current * 230 * (3 if target_phase == 'Triphasic' else 1) }}"
              power_deficit: "{{ current_power - available_power }}"
          - if:
              # Reset counter if no deficit (power is sufficient)
              - condition: template
                value_template: "{{ power_deficit <= 0 }}"
            then:
              - service: counter.reset
                target:
                  entity_id: counter.ev_margin_allowance_counter

      # Step 6: Start charging (only if needed)
      - if:
          - condition: template
            value_template: "{{ needs_to_start_charging }}"
        then:
          - service: persistent_notification.create
            data:
              title: "PV-EV: Starting Charging"
              message: >
                Settings verified:
                Phase: {{ target_phase }}
                Current: {{ target_current }}A
                Starting charging... (API call)
              notification_id: pv_ev_start_charging
          - service: script.control_charging
            data:
              action: "on"

  # Stop charging when automation is turned off
  - id: pv_ev_surplus_automation_off
    alias: "PV-EV Surplus Automation OFF"
    description: "Stop charging when automation is turned off"
    trigger:
      - platform: state
        entity_id: input_boolean.pv_ev_surplus_automation
        to: "off"
    condition:
      # Only stop charging if currently charging
      - condition: state
        entity_id: sensor.pv_ev_current_charging_state
        state: "True"
    action:
      - service: script.control_charging
        data:
          action: "off"
      - service: counter.reset
        target:
          entity_id: counter.ev_margin_allowance_counter

  # Handle Tesla Current API switch changes
  - id: pv_ev_tesla_current_api_change
    alias: "PV-EV Tesla Current API Change"
    description: "Handle Tesla Current API switch changes"
    trigger:
      - platform: state
        entity_id: input_boolean.tesla_charge_current_api
    condition:
      # Skip entirely in EV Charger Only mode - never touch Tesla entities
      - condition: state
        entity_id: input_boolean.ev_charger_only_mode
        state: "off"
    action:
      - choose:
          # Tesla API turned ON
          - conditions:
              - condition: state
                entity_id: input_boolean.tesla_charge_current_api
                state: "on"
            sequence:
              - service: number.set_value
                target:
                  entity_id: "{{ states('sensor.pv_ev_active_tesla_charge_current_number') }}"
                data:
                  value: "{{ states('input_number.tesla_min_charging_a') | int }}"
              - service: number.set_value
                target:
                  entity_id: number.ev_charger_set_charge_current
                data:
                  value: 16
        # Tesla API turned OFF
        default:
          - service: number.set_value
            target:
              entity_id: number.ev_charger_set_charge_current
            data:
              value: "{{ states('input_number.ev_charger_min_charging_a') | int }}"

  # Handle automation turn ON setup
  - id: pv_ev_automation_turn_on_setup
    alias: "PV-EV Automation Turn ON Setup"
    description: "Setup when automation is turned ON"
    trigger:
      - platform: state
        entity_id: input_boolean.pv_ev_surplus_automation
        to: "on"
    condition:
      # Only run setup if EV is connected
      - condition: template
        value_template: "{{ states('sensor.ev_charger_status') in ['plugged_in', 'charged', 'charging'] }}"
    action:
      - choose:
          # If Tesla API is enabled, set EV charger to max current
          - conditions:
              - condition: state
                entity_id: binary_sensor.pv_ev_tesla_current_api_active
                state: "on"
            sequence:
              - service: number.set_value
                target:
                  entity_id: number.ev_charger_set_charge_current
                data:
                  value: 16

  # Refresh Tesla data so cable/location/charging are fresh for the model
  # detection/sync below (also keeps other dashboards current). Runs on connect
  # and on HA restart. The delay + mode: restart collapse the plugged_in ->
  # charging pair into a single (metered) API poll.
  - id: pv_ev_refresh_tesla_data
    alias: "PV-EV Refresh Tesla Data"
    description: "Force-refresh Tesla entities on connect and on HA restart (feeds model detection)"
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.ev_charger_status
        to:
          - charging
          - plugged_in
        id: plugged_in
      - platform: homeassistant
        event: start
        id: ha_start
    action:
      # On HA restart the cars may be asleep, and Tesla Fleet won't refresh a
      # sleeping car via update_entity - so wake both first. On a plug-in the car
      # is already awake from being plugged in, so skip the wake (no wasted call).
      - if:
          - condition: trigger
            id: ha_start
        then:
          # Wait until the system is up (wallbox sensor available) before waking
          - wait_template: "{{ states('sensor.ev_charger_status') not in ['unknown', 'unavailable'] }}"
            timeout: "00:02:00"
            continue_on_timeout: true
          - service: button.press
            target:
              entity_id:
                - button.tesla_model_y_wake
                - button.tesla_model_3_wake
          - delay: "00:00:15"
        else:
          # plug-in: car already awake, let the plug-in propagate to the cloud
          - delay: "00:00:05"
      - service: homeassistant.update_entity
        target:
          entity_id:
            - switch.tesla_model_y_charge
            - number.tesla_model_y_charge_current
            - binary_sensor.tesla_model_y_charge_cable
            - switch.tesla_model_3_charge
            - number.tesla_model_3_charge_current
            - binary_sensor.tesla_model_3_charge_cable
            - lock.tesla_model_3_charge_cable_lock
            - lock.tesla_model_y_charge_cable_lock
            - cover.tesla_model_3_charge_port_door
            - cover.tesla_model_y_charge_port_door
            - sensor.tesla_model_3_battery_level
            - sensor.tesla_model_y_battery_level
            - sensor.tesla_model_3_charging
            - sensor.tesla_model_y_charging
            - device_tracker.tesla_model_3_location
            - device_tracker.tesla_model_y_location

  # Fallback (Tesla Fleet): a car is on the wallbox but we cannot tell which one
  # (detection stuck at Unknown = the car is likely asleep, so its cable/location
  # are stale and update_entity alone can't refresh them). Wake both candidates
  # once, then re-poll so detection resolves. Bounded: only while the automation
  # is on, not in EV Charger Only mode, and after a 90s settle so a normal
  # plug-in resolves on its own first. Fires once per stuck period (no wake loop).
  - id: pv_ev_wake_to_identify
    alias: "PV-EV Wake To Identify Model"
    description: "Wake both Teslas to resolve an unidentifiable connected car"
    mode: single
    trigger:
      - platform: template
        value_template: >
          {{ is_state('input_boolean.pv_ev_surplus_automation', 'on')
             and is_state('input_boolean.ev_charger_only_mode', 'off')
             and states('sensor.ev_charger_status') in ['charging', 'plugged_in']
             and is_state('sensor.pv_ev_detected_tesla_model', 'Unknown') }}
        for: "00:01:30"
    action:
      - service: button.press
        target:
          entity_id:
            - button.tesla_model_y_wake
            - button.tesla_model_3_wake
      # Tesla Fleet needs the car awake before it returns fresh data
      - delay: "00:00:15"
      - service: homeassistant.update_entity
        target:
          entity_id:
            - binary_sensor.tesla_model_y_charge_cable
            - binary_sensor.tesla_model_3_charge_cable
            - device_tracker.tesla_model_y_location
            - device_tracker.tesla_model_3_location
            - sensor.tesla_model_y_charging
            - sensor.tesla_model_3_charging

  # Keep input_select.tesla_model in sync with the physically connected car.
  # State-derived (not a single rising edge) and re-evaluated on every relevant
  # signal, so a missed plug-in edge (e.g. HA restart with a cable already
  # connected) is corrected at the next wake-up instead of never.
  - id: pv_ev_sync_tesla_model
    alias: "PV-EV Sync Tesla Model"
    description: "Auto-correct the selected Tesla model to the connected car"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.pv_ev_detected_tesla_model
      - platform: state
        entity_id: sensor.ev_charger_status
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: input_boolean.pv_ev_surplus_automation
        to: "on"
    condition:
      # Only act when detection is definite and differs from the current pick
      - condition: template
        value_template: >
          {% set d = states('sensor.pv_ev_detected_tesla_model') %}
          {{ d in ['Model Y', 'Model 3'] and not is_state('input_select.tesla_model', d) }}
    action:
      - service: input_select.select_option
        target:
          entity_id: input_select.tesla_model
        data:
          option: "{{ states('sensor.pv_ev_detected_tesla_model') }}"

  # Safety: if the selected model can't be confirmed as the connected car while
  # charging (ambiguous detection, or the sync could not correct it), stop
  # charging so we never keep feeding current to the wrong / uncertain car.
  # The 30s debounce lets the sync auto-correct definite cases first; only a
  # sustained unconfirmed state (Unknown/ambiguous) trips it. Inert in EV
  # Charger Only mode (Model Confirmed is forced true there).
  - id: pv_ev_tesla_model_safety
    alias: "PV-EV Tesla Model Safety"
    description: "Stop charging if the connected Tesla model can't be confirmed"
    mode: single
    trigger:
      - platform: template
        value_template: >
          {{ is_state('sensor.ev_charger_status', 'charging')
             and is_state('binary_sensor.pv_ev_tesla_model_confirmed', 'off') }}
        for: "00:00:30"
    condition:
      - condition: state
        entity_id: input_boolean.pv_ev_surplus_automation
        state: "on"
    action:
      - service: script.control_charging
        data:
          action: "off"
      - service: counter.reset
        target:
          entity_id: counter.ev_margin_allowance_counter
      - service: persistent_notification.create
        data:
          title: "PV-EV: Tesla Model Unconfirmed"
          message: >
            Stopped charging - could not confirm which Tesla is connected.
            Selected: {{ states('input_select.tesla_model') }};
            detected: {{ states('sensor.pv_ev_detected_tesla_model') }}
            (Y cable: {{ states('binary_sensor.tesla_model_y_charge_cable') }},
            3 cable: {{ states('binary_sensor.tesla_model_3_charge_cable') }}).
            If a non-Tesla is plugged in, enable EV Charger Only mode; otherwise
            check the cars / plug and reselect the model.
          notification_id: pv_ev_model_unconfirmed

  # Handle battery SOC threshold -> switch EV share between Max (at/above
  # threshold) and Default (below). Merges the former max/below automations.
  - id: pv_ev_battery_soc_share_threshold
    alias: "PV-EV Battery SOC Share Threshold"
    description: "Set EV share to Max at/above the battery SOC threshold, Default below"
    trigger:
      - platform: state
        entity_id: sensor.gw_battery
      - platform: state
        entity_id: input_number.battery_soc_max_share_threshold
      - platform: state
        entity_id: input_boolean.pv_ev_surplus_automation
        to: "on"
      - platform: homeassistant
        event: start
    condition:
      # Daytime only - share is irrelevant at night, corrects on the first
      # battery update after sunrise
      - condition: state
        entity_id: sun.sun
        state: "above_horizon"
    action:
      - choose:
          # At/above threshold and not already Max -> Max
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.gw_battery') | float(0) >= states('input_number.battery_soc_max_share_threshold') | float(90) }}
              - condition: template
                value_template: "{{ states('input_select.ev_share_percentage') != 'Max' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.ev_share_percentage
                data:
                  option: "Max"
          # Below threshold and currently Max -> Default
          - conditions:
              - condition: template
                value_template: >
                  {{ states('sensor.gw_battery') | float(0) < states('input_number.battery_soc_max_share_threshold') | float(90) }}
              - condition: state
                entity_id: input_select.ev_share_percentage
                state: "Max"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.ev_share_percentage
                data:
                  option: "Default"

  # Safety net: stop charging whenever it happens without PV surplus, at ANY
  # time of day. The main update logic is gated to daytime + connected, so by
  # itself it cannot stop charging that begins at night (e.g. the car
  # auto-charges the moment it is plugged in). This runs 24/7 to catch that.
  - id: pv_ev_stop_when_no_surplus
    alias: "PV-EV Stop When No Surplus"
    description: "Stop charging if it occurs without PV surplus (e.g. plugged in after sunset)"
    mode: single
    trigger:
      # Backstop re-check, plus immediate catches on charge-start and sunset
      - platform: time_pattern
        minutes: "/2"
      - platform: state
        entity_id: sensor.ev_charger_status
        to: "charging"
      - platform: state
        entity_id: sun.sun
        to: "below_horizon"
    condition:
      - condition: state
        entity_id: input_boolean.pv_ev_surplus_automation
        state: "on"
      - condition: state
        entity_id: sensor.ev_charger_status
        state: "charging"
      # No surplus: target below the charge minimum, or it's night (never surplus)
      - condition: template
        value_template: >
          {{ (states('sensor.pv_ev_target_current') | int(0)
              < states('sensor.pv_ev_min_charging_current') | int(1))
             or is_state('sun.sun', 'below_horizon') }}
    action:
      - service: script.control_charging
        data:
          action: "off"
      - service: counter.reset
        target:
          entity_id: counter.ev_margin_allowance_counter
      - service: persistent_notification.create
        data:
          title: "PV-EV: Charging Stopped (no surplus)"
          message: >
            Stopped charging - no PV surplus.
            Target {{ states('sensor.pv_ev_target_current') }}A <
            min {{ states('sensor.pv_ev_min_charging_current') }}A;
            sun is {{ states('sun.sun') }}.
            (Likely started without surplus, e.g. plugged in after sunset.)
          notification_id: pv_ev_no_surplus_stop

  # Emergency stop on critical conditions
  - id: pv_ev_emergency_stop
    alias: "PV-EV Emergency Stop"
    description: "Emergency stop charging on critical conditions"
    trigger:
      - platform: template
        value_template: >
          {% set battery_soc = states('sensor.gw_battery') | float(-1) %}
          {% set grid_power = states('sensor.gw_from_grid') | float(0) %}
          {% set ev_status = states('sensor.ev_charger_status') %}
          {% set pv_power = states('sensor.gw_pv') | float(0) %}

          {% if battery_soc == -1 or ev_status == 'unknown' or ev_status == 'unavailable' %}
            true
          {% elif battery_soc < 5 %}
            true
          {% elif grid_power > 5000 %}
            true
          {% elif pv_power < 0 %}
            true
          {% else %}
            false
          {% endif %}
    condition:
      - condition: state
        entity_id: input_boolean.pv_ev_surplus_automation
        state: "on"
      # Only emergency stop if currently charging
      - condition: state
        entity_id: sensor.pv_ev_current_charging_state
        state: "True"
    action:
      - service: script.emergency_stop_charging
      - service: persistent_notification.create
        data:
          title: "PV-EV Automation Emergency Stop"
          message: >
            Emergency stop triggered due to critical conditions:
            - Battery SOC: {{ states('sensor.gw_battery') }}%
            - Grid Power: {{ states('sensor.gw_from_grid') }}W
            - EV Status: {{ states('sensor.ev_charger_status') }}
            - PV Power: {{ states('sensor.gw_pv') }}W
          notification_id: pv_ev_emergency

  # Validate sensor availability before automation runs
  - id: pv_ev_sensor_validation
    alias: "PV-EV Sensor Validation"
    description: "Validate critical sensors are available"
    trigger:
      - platform: state
        entity_id: input_boolean.pv_ev_surplus_automation
        to: "on"
    action:
      - variables:
          missing_sensors: >
            {% set sensors = [
              'sensor.gw_battery',
              'sensor.gw_pv', 
              'sensor.gw_load',
              'sensor.gw_from_grid',
              'sensor.ev_charger_power',
              'sensor.ev_charger_status'
            ] %}
            {% set missing = [] %}
            {% for sensor in sensors %}
              {% if states(sensor) in ['unavailable', 'unknown'] %}
                {% set missing = missing + [sensor] %}
              {% endif %}
            {% endfor %}
            {{ missing | join(', ') }}
      - condition: template
        value_template: "{{ missing_sensors | length > 0 }}"
      - service: persistent_notification.create
        data:
          title: "PV-EV Sensor Warning"
          message: >
            Some sensors are unavailable. Charging paused until recovery:
            {{ missing_sensors }}
          notification_id: pv_ev_sensor_error

  # Monitor for sensor failures during operation
  - id: pv_ev_sensor_monitor
    alias: "PV-EV Sensor Monitor"
    description: "Monitor sensors during operation and stop if failures detected"
    trigger:
      - platform: state
        entity_id:
          - sensor.gw_battery
          - sensor.gw_pv
          - sensor.gw_load
          - sensor.gw_from_grid
          - sensor.ev_charger_power
          - sensor.ev_charger_status
        to:
          - "unavailable"
          - "unknown"
        for:
          seconds: 30
    condition:
      - condition: state
        entity_id: input_boolean.pv_ev_surplus_automation
        state: "on"
    action:
      - service: script.emergency_stop_charging
      - service: persistent_notification.create
        data:
          title: "PV-EV Sensor Failure"
          message: >
            Emergency stop triggered due to sensor failure:
            {{ trigger.entity_id }} became {{ trigger.to_state.state }}
            Automation remains enabled and will resume when sensor recovers.
          notification_id: pv_ev_sensor_failure

# Scripts
script:
  # Direct charging control based on API mode
  control_charging:
    alias: "Control Charging"
    description: "Turn charging ON/OFF based on selected API mode"
    fields:
      action:
        description: "Action to perform: 'on' or 'off'"
        example: "on"
    sequence:
      # Check if EV is connected before making API calls
      - variables:
          ev_status: "{{ states('sensor.ev_charger_status') }}"
      - condition: template
        value_template: "{{ ev_status in ['plugged_in', 'charged', 'charging'] }}"
      - choose:
          # Use Tesla API
          - conditions:
              - condition: state
                entity_id: binary_sensor.pv_ev_tesla_on_off_api_active
                state: "on"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ action == 'on' }}"
                    sequence:
                      - service: switch.turn_on
                        target:
                          entity_id: "{{ states('sensor.pv_ev_active_tesla_charge_switch') }}"
                default:
                  - service: switch.turn_off
                    target:
                      entity_id: "{{ states('sensor.pv_ev_active_tesla_charge_switch') }}"
        # Use EV Charger Select
        default:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ action == 'on' }}"
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: select.ev_charger_charging
                    data:
                      option: "on"
            default:
              - service: select.select_option
                target:
                  entity_id: select.ev_charger_charging
                data:
                  option: "off"

  # Update charging current based on API mode
  update_charging_current:
    alias: "Update Charging Current"
    description: "Update charging current based on selected API mode"
    fields:
      current:
        description: "Target current in Amperes"
        example: 10
    sequence:
      # Check if EV is connected before making API calls
      - variables:
          ev_status: "{{ states('sensor.ev_charger_status') }}"
      - condition: template
        value_template: "{{ ev_status in ['plugged_in', 'charged', 'charging'] }}"
      - choose:
          # Use Tesla API
          - conditions:
              - condition: state
                entity_id: binary_sensor.pv_ev_tesla_current_api_active
                state: "on"
              - condition: template
                value_template: "{{ current | int >= 1 and current | int <= 16 }}"
            sequence:
              - service: number.set_value
                target:
                  entity_id: "{{ states('sensor.pv_ev_active_tesla_charge_current_number') }}"
                data:
                  value: "{{ current | int }}"
        # Use EV Charger API
        default:
          - condition: template
            value_template: >
              {% set floor = states('input_number.ev_charger_min_charging_a') | int(6) %}
              {{ current | int >= floor and current | int <= 16 }}
          - service: number.set_value
            target:
              entity_id: number.ev_charger_set_charge_current
            data:
              value: "{{ current | int }}"

  # Emergency stop charging
  emergency_stop_charging:
    alias: "Emergency Stop Charging"
    description: "Emergency stop with all safety checks"
    sequence:
      - service: script.control_charging
        data:
          action: "off"
      - service: counter.reset
        target:
          entity_id: counter.ev_margin_allowance_counter
      - choose:
          - conditions:
              - condition: state
                entity_id: binary_sensor.pv_ev_tesla_on_off_api_active
                state: "on"
            sequence:
              - service: switch.turn_off
                target:
                  entity_id: "{{ states('sensor.pv_ev_active_tesla_charge_switch') }}"
        default:
          - service: select.select_option
            target:
              entity_id: select.ev_charger_charging
            data:
              option: "off"
